[build]
  base = "frontend"      # <-- Change this to your actual subfolder name
  command = "npm run build"
  publish = "dist"       # Netlify automatically looks for 'dist' inside the base folder now

# Critical for SPAs: Redirects all routes to index.html to avoid Netlify 404s on page refresh
[[redirects]]
  from = "/*"
  status = 200
  to = "/index.html"

# Essential Security and Basic Caching Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "frame-ancestors 'none';"
    Cache-Control = "public, max-age=0, must-revalidate"

# Performance caching for your compiled JS/CSS bundles
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
