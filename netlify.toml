# Configuration matching your project setup
[build]
  base = "frontend"
  command = "npm run build"
  publish = "build"        # FIXED: Points to Create React App's default output folder

[functions]
  included_files = ["backend/**"]
# Critical for SPAs: Redirects all routes to index.html to avoid Netlify 404s on page refresh
[[redirects]]
  from = "/*"
  status = 200
  to = "/index.html"

# Essential Security and Basic Caching Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "frame-ancestors 'none';"
    Cache-Control = "public, max-age=0, must-revalidate"

# Performance caching for your compiled static assets
[[headers]]
  for = "/static/*"        # FIXED: CRA outputs assets into a /static folder instead of /assets
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Forces Netlify to ignore ESLint warnings during compilation
[build.environment]
  CI = "false"
