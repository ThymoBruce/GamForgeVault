# Global build settings
[build]
  # The directory where Netlify runs your build command
  command = "npm run build"
  
  # The directory that contains the deploy-ready HTML/CSS/JS
  # (Change to "dist" for Vite, "build" for React/CRA, or ".next" for Next.js)
  publish = "dist"

# Single Page Application (SPA) Routing
# This redirects all traffic to index.html so your frontend router can handle the paths
[[redirects]]
  from = "/*"
  status = 200
  to = "/index.html"

# Security and Performance Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "frame-ancestors 'none';"
    # Enable aggressive caching for static assets, but not for the index file
    Cache-Control = "public, max-age=0, must-revalidate"

# Specific caching for JS/CSS assets (if your builder hashes filenames)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
